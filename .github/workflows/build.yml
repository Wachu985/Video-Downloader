name: Build releases

# `flet build` can only compile for the OS it runs on (no cross-compilation),
# so each platform is built on its own runner.
#
# Triggers:
#   - Pushing a tag `v*` builds all three platforms and attaches the binaries
#     to the GitHub release for that tag.
#   - Manual runs (workflow_dispatch) upload the binaries as workflow artifacts.
#
# Version policy: everything here is PINNED on purpose (actions, uv, Python).
# Nothing auto-updates; bump versions manually when you decide to.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  # Keep in sync with .python-version
  PYTHON_VERSION: "3.13"
  # Keep in sync with the uv version used locally
  UV_VERSION: "0.11.2"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: build/macos
          - os: windows-latest
            platform: windows
            artifact: build/windows
          - os: ubuntu-latest
            platform: linux
            artifact: build/linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev mpv

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      # --frozen installs exactly what uv.lock pins; it never re-resolves.
      - name: Install project dependencies
        run: uv sync --frozen

      # --yes lets flet download the exact Flutter SDK version required by
      # the pinned flet release (deterministic: it comes from uv.lock).
      - name: Build (${{ matrix.platform }})
        run: uv run flet build ${{ matrix.platform }} -v --yes

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: video-downloader-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Package for release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd build
          if [ "${{ matrix.platform }}" = "macos" ]; then
            ditto -c -k --sequesterRsrc --keepParent "macos/Video Downloader.app" "VideoDownloader-macos.zip"
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            7z a VideoDownloader-windows.zip windows/*
          else
            tar -czf VideoDownloader-linux.tar.gz -C linux .
          fi

      - name: Attach binaries to the release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: |
            build/VideoDownloader-*.zip
            build/VideoDownloader-*.tar.gz
